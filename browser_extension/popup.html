<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SE Downloader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:340px;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
     font-size:13px;background:#f5f5f5;color:#1a1a1a}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1c;color:#e8e8e8}
  .card{background:#2d2d2d;border-color:#3a3a3a}
  input,textarea{background:#252525;border-color:#444;color:#e8e8e8}
  .status-bar{background:#252525;border-color:#3a3a3a}
  .tab-row{background:#333}
  .tab.active{background:#444;color:#4da3ff}
}
.header{background:#0078D4;color:white;padding:12px 16px;display:flex;align-items:center;gap:10px}
.header h1{font-size:15px;font-weight:600}
.header small{font-size:11px;opacity:.8}
.status-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;
             background:white;border-bottom:1px solid #e0e0e0;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#107C10}.dot.err{background:#D13438}
.body{padding:12px;display:flex;flex-direction:column;gap:10px}
.card{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:12px}
.card-title{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;
             letter-spacing:.5px;margin-bottom:8px}
input,textarea{width:100%;border:1px solid #d0d0d0;border-radius:6px;
               padding:7px 9px;font-size:13px;font-family:inherit;outline:none;
               transition:border-color .15s}
input:focus,textarea:focus{border-color:#0078D4}
textarea{height:58px;resize:none}
.btn-row{display:flex;gap:8px;margin-top:8px}
button{flex:1;padding:8px 10px;border:none;border-radius:6px;font-size:13px;
       font-family:inherit;cursor:pointer;font-weight:500;transition:opacity .15s}
button:hover{opacity:.88}
.btn-p{background:#0078D4;color:white}
.btn-s{background:#e8e8e8;color:#333}
.tab-row{display:flex;background:#e8e8e8;border-radius:8px;padding:3px;gap:0}
.tab{flex:1;padding:5px;border:none;background:none;border-radius:6px;cursor:pointer;
     font-size:12px;color:#555;transition:all .15s}
.tab.active{background:white;color:#0078D4;font-weight:700;
             box-shadow:0 1px 3px rgba(0,0,0,.1)}
.panel{display:none}.panel.active{display:block}
.row2{display:flex;align-items:center;justify-content:space-between;padding:5px 0;
      border-bottom:1px solid #f0f0f0}
.row2:last-child{border:none}
.toggle{width:38px;height:20px;background:#ccc;border-radius:10px;position:relative;
        cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:#0078D4}
.toggle::after{content:"";position:absolute;width:16px;height:16px;background:white;
               border-radius:50%;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:20px}
.footer{padding:6px 14px;text-align:center;font-size:11px;color:#999;
        border-top:1px solid #eee}
.toast{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
       background:#323232;color:white;padding:7px 14px;border-radius:6px;
       font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="11" fill="rgba(255,255,255,.2)"/>
    <path d="M12 4v10M8 10l4 4 4-4M6 18h12" stroke="white" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div><h1>SE Downloader</h1><small>高速多线程接管下载</small></div>
</div>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="stxt">检查连接...</span>
</div>

<div class="body">
  <div class="tab-row">
    <button class="tab active" id="tab-dl">下载</button>
    <button class="tab" id="tab-batch">批量</button>
    <button class="tab" id="tab-opt">设置</button>
  </div>

  <div class="panel active" id="panel-dl">
    <div class="card">
      <div class="card-title">下载链接</div>
      <input id="urlInput" type="url" placeholder="https://example.com/file.zip">
      <div class="btn-row">
        <button class="btn-p" id="btnSend">发送到下载器</button>
        <button class="btn-s" id="btnFillTab">当前页面</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-batch">
    <div class="card">
      <div class="card-title">批量下载（每行一个URL）</div>
      <textarea id="batchTxt" placeholder="https://...&#10;https://..."></textarea>
      <div class="btn-row">
        <button class="btn-p" id="btnBatch">全部发送</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-opt">
    <div class="card">
      <div class="card-title">快捷设置</div>
      <div class="row2">
        <span>自动拦截下载</span>
        <button class="toggle" id="tog-auto"></button>
      </div>
      <div class="row2">
        <span>拦截所有下载</span>
        <button class="toggle" id="tog-all"></button>
      </div>
      <div class="row2">
        <span>完成通知</span>
        <button class="toggle" id="tog-notif"></button>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:12px;color:#666;margin-bottom:4px">拦截后缀（逗号分隔）</div>
        <input id="extIn" placeholder="zip,rar,exe,mp4...">
      </div>
      <div style="margin-top:8px">
        <div style="font-size:12px;color:#666;margin-bottom:4px">桌面应用端口</div>
        <input id="portIn" type="number" placeholder="26339">
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn-p" id="btnSaveOpt">保存</button>
        <button class="btn-s" id="btnAdvanced">高级设置</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">SE Downloader v2.0 · Chrome &amp; Edge</div>
<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
